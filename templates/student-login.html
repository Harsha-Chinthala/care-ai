<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Care-AI</title>
    <link rel="icon" type="image/png" href="../static/assets/logo.png">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(rgba(10, 17, 32, 0.56), rgba(10, 17, 32, 0.56)),
                url("../static/assets/veltech.jpg") no-repeat center center / cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.16), transparent 24%),
                radial-gradient(circle at 82% 18%, rgba(255, 107, 107, 0.18), transparent 20%);
            animation: driftGlow 14s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .wrapper {
            width: 420px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 32px 36px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
            animation: authLift 0.8s ease;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            position: relative;
            z-index: 1;
        }
        .wrapper:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; text-align: center; }
        p.subtitle { text-align: center; opacity: 0.85; margin-bottom: 1.5rem; }
        .input-box { position: relative; margin: 16px 0; }
        .input-box input {
            width: 100%;
            padding: 14px 44px 14px 16px;
            border: 2px solid rgba(255,255,255,0.18);
            background: transparent;
            border-radius: 999px;
            color: #fff;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.25s ease, background-color 0.25s ease, transform 0.25s ease;
        }
        .input-box input:focus {
            border-color: rgba(255,255,255,0.42);
            background: rgba(255,255,255,0.04);
            transform: translateY(-1px);
        }
        .input-box i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            cursor: pointer;
        }
        .button-nomad {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ff6b6b;
            background: #ff6b6b;
            color: #fff;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.25s ease, background-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
        }
        .button-nomad:hover { background: transparent; color: #ff6b6b; transform: translateY(-2px); box-shadow: 0 12px 24px rgba(255, 107, 107, 0.18); }
        .button-nomad:disabled { opacity: 0.65; cursor: not-allowed; }
        .error, .success { min-height: 20px; margin-top: 10px; font-size: 0.92rem; }
        .error { color: #ff8b8b; }
        .success { color: #8dffb2; }
        .links {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 18px;
            font-size: 0.92rem;
        }
        .links a { color: #fff; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .brand {
            display: grid;
            justify-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .brand img {
            width: 94px;
            height: 94px;
            object-fit: contain;
            border-radius: 50%;
            background: rgba(255,255,255,0.94);
            padding: 6px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.25);
            animation: logoFloat 5.4s ease-in-out infinite;
        }
        @keyframes authLift {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes driftGlow {
            from { transform: translate3d(0, 0, 0) scale(1); opacity: 0.9; }
            to { transform: translate3d(0, -14px, 0) scale(1.04); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="brand">
            <img src="../static/assets/logo.png" alt="Vel Tech Logo">
        </div>
        <h1>Student Login</h1>
        <p class="subtitle">Sign in with your student Firebase account.</p>

        <div class="input-box">
            <input type="email" id="email" placeholder="College Email" autocomplete="username" required>
            <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
            <i class='bx bxs-lock-alt' id="togglePassword"></i>
        </div>

        <button id="loginBtn" class="button-nomad">Login</button>
        <div id="loginMsg" class="error"></div>

        <div class="links">
            <a href="/student-register">Create student account</a>
            <a href="/admin-login">Admin login</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBoV-z8VnbVcsMRkLuwhsuOUd88aXVp7Hw",
            authDomain: "careai-b88db.firebaseapp.com",
            projectId: "careai-b88db",
            storageBucket: "careai-b88db.firebasestorage.app",
            messagingSenderId: "190414171649",
            appId: "1:190414171649:web:6a2925fe1364697c5f5a00"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginMsg = document.getElementById('loginMsg');
        const togglePassword = document.getElementById('togglePassword');
        const allowedDomain = /@veltech\.edu\.in$/i;

        togglePassword.addEventListener('click', () => {
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        });

        loginBtn.addEventListener('click', async () => {
            loginMsg.textContent = '';
            const email = String(emailInput.value || '').trim();
            const password = String(passwordInput.value || '').trim();

            if (!email || !password) {
                loginMsg.textContent = 'Please enter email and password.';
                return;
            }

            if (!allowedDomain.test(email)) {
                loginMsg.textContent = 'Only @veltech.edu.in emails are allowed.';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                await userCredential.user.reload();

                if (!userCredential.user.emailVerified) {
                    await auth.signOut();
                    loginMsg.textContent = 'Please verify your email before logging in.';
                    return;
                }

                const userDoc = await db.collection('users').doc(userCredential.user.uid).get();
                const role = userDoc.exists ? userDoc.data().role : '';

                if (role !== 'student') {
                    await auth.signOut();
                    loginMsg.textContent = 'This account is not registered as a student.';
                    return;
                }

                loginMsg.className = 'success';
                loginMsg.textContent = 'Login successful. Redirecting...';
                setTimeout(() => {
                    window.location.href = '/student-dashboard';
                }, 500);
            } catch (error) {
                loginMsg.className = 'error';
                loginMsg.textContent = error.message || 'Login failed.';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
